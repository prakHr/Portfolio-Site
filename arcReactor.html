<!DOCTYPE html>
<html>
<head>
  <title>Globe UI (ID Based)</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* 🌍 Globe */
    #globeViz {
      width: 100vw;
      height: 100vh;
      transition: opacity 1s ease;
    }

    .hidden {
      opacity: 0;
      pointer-events: none;
    }

    /* ⚡ Arc Reactor */
    #arcReactor {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 120px;
      z-index: 10;
      pointer-events: none;
      animation: pulse 2s infinite ease-in-out;
    }

    @keyframes pulse {
      0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
      50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
    }

    /* 📋 Navbar */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      background: black;
      padding: 10px;
      z-index: 1000;
      display: flex;
      gap: 15px;
    }

    .nav-link {
      color: white;
      text-decoration: none;
      cursor: pointer;
    }

    /* 🔙 Back Button */
    #backBtn {
      position: fixed;
      top: 50px;
      left: 20px;
      padding: 10px 15px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      z-index: 1000;
      display: none;
    }

    /* 📦 Sections (ALL hidden by default) */
    #top, #about, #contact {
      display: none;
      height: 100vh;
      padding: 80px 20px;
    }

    #top {
      background: #111;
      color: white;
    }

    #about {
      background: #f4f4f4;
    }

    #contact {
      background: #ddd;
    }

    /* 🧊 3D ScrollBox */
    .scrollbox {
      width: 80%;
      height: 300px;
      margin: 40px auto;
      perspective: 1000px;
    }

    .scroll-content {
      height: 100%;
      overflow-y: auto;
      padding: 20px;
      background: rgba(0,0,0,0.8);
      color: white;
      border-radius: 15px;
      transform: rotateX(10deg);
      transition: 0.3s;
    }

    .scrollbox:hover .scroll-content {
      transform: rotateX(0deg) scale(1.02);
    }
  </style>
</head>

<body>

  <!-- 📋 Navbar -->
  <div class="navbar">
    <a class="nav-link" href="#top">HOME</a>
    <a class="nav-link" href="#about">ABOUT</a>
    <a class="nav-link" href="#contact">CONTACT</a>
  </div>

  <!-- 🔙 Back -->
  <button id="backBtn">⬅ Back</button>

  <!-- 🌍 Globe -->
  <div id="globeViz"></div>

  <!-- 🏠 Sections -->
  <div id="top">
    <h1>Home Section</h1>

    <div class="scrollbox">
      <div class="scroll-content">
        <h2>🚀 3D ScrollBox</h2>
        <p>Scrollable content inside box</p>
        <p>Lorem ipsum...</p>
        <p>More content...</p>
        <p>Keep scrolling...</p>
        <p>Still going...</p>
      </div>
    </div>
  </div>

  <div id="about">
    <h1>About Section</h1>
  </div>

  <div id="contact">
    <h1>Contact Section</h1>
  </div>

  <script src="https://unpkg.com/globe.gl"></script>

  <script>
    const globeContainer = document.getElementById('globeViz');
    const backBtn = document.getElementById('backBtn');
    const arcReactor = document.getElementById('arcReactor');

    // 🧠 List of section IDs
    const sections = ["top", "about", "contact"];

    function showSection(id) {
      sections.forEach(secId => {
        document.getElementById(secId).style.display = 'none';
      });

      document.getElementById(id).style.display = 'block';
    }

    const globe = Globe()(globeContainer)
      .globeImageUrl('//unpkg.com/three-globe/example/img/earth-dark.jpg')

      .pointsData([
        { lat: 28.6, lng: 77.2, label: "Home", target: "top" },
        { lat: 19.07, lng: 72.87, label: "About", target: "about" },
        { lat: 40.71, lng: -74.00, label: "Contact", target: "contact" }
      ])

      .pointLabel('label')
      .pointAltitude(0.02)

      .onPointClick(point => {
        globeContainer.classList.add('hidden');
        arcReactor.classList.add('hidden');

        setTimeout(() => {
          globeContainer.style.display = 'none';
          arcReactor.style.display = 'none';

          showSection(point.target);
          backBtn.style.display = 'block';
        }, 1000);
      });

    // 📋 Navbar click
    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', function(e) {
        e.preventDefault();

        const id = this.getAttribute('href').substring(1);

        globeContainer.style.display = 'none';
        arcReactor.style.display = 'none';

        showSection(id);
        backBtn.style.display = 'block';
      });
    });

    // 🔙 Back button
    backBtn.addEventListener('click', () => {
      sections.forEach(id => {
        document.getElementById(id).style.display = 'none';
      });

      backBtn.style.display = 'none';

      globeContainer.style.display = 'block';
      arcReactor.style.display = 'block';

      void globeContainer.offsetWidth;

      globeContainer.classList.remove('hidden');
      arcReactor.classList.remove('hidden');
    });

    // 🌍 Rotation
    globe.controls().autoRotate = true;
    globe.controls().autoRotateSpeed = 0.1;
  </script>

</body>
</html>
